<template x-teleport="body">
    <div x-data="{
            toasts: [],
            add(detail) {
                const t = { id: Date.now(), ...detail };
                this.toasts.unshift(t);
                if (t.duration !== 0)
                    setTimeout(() => this.dismiss(t.id), t.duration || 4500);
            },
            dismiss(id) {
                const el = document.getElementById('toast-' + id);
                if (el) {
                    el.style.opacity = '0';
                    el.style.transform = 'translateX(110%)';
                    setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 300);
                }
            }
        }"
        @toast-show.window="add($event.detail)"
        class="fixed top-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none"
        style="width: min(20rem, calc(100vw - 2rem))"
        x-cloak>

        <template x-for="toast in toasts" :key="toast.id">
            <div :id="'toast-' + toast.id"
                 x-init="$nextTick(() => lucide.createIcons())"
                 class="flex items-start space-x-3 bg-white border border-gray-100 rounded-2xl shadow-lg px-4 py-3 pointer-events-auto"
                 style="transition: opacity 0.3s ease, transform 0.3s ease;">

                <div class="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0"
                     :class="{
                         'bg-green-100': toast.type === 'success',
                         'bg-red-100':   toast.type === 'error' || toast.type === 'danger',
                         'bg-amber-100': toast.type === 'warning',
                         'bg-gray-100':  !['success','error','danger','warning'].includes(toast.type)
                     }">
                    <i class="w-4 h-4"
                       :class="{
                           'text-green-600': toast.type === 'success',
                           'text-red-600':   toast.type === 'error' || toast.type === 'danger',
                           'text-amber-600': toast.type === 'warning',
                           'text-gray-500':  !['success','error','danger','warning'].includes(toast.type)
                       }"
                       :data-lucide="
                           toast.type === 'success'                          ? 'check-circle'  :
                           toast.type === 'error' || toast.type === 'danger' ? 'x-circle'      :
                           toast.type === 'warning'                          ? 'alert-triangle' :
                           'info'
                       "></i>
                </div>

                <p class="text-sm font-medium text-dark-800 flex-1 pt-1" x-text="toast.message"></p>

                <button @click="dismiss(toast.id)"
                        class="text-dark-400 hover:text-dark-600 flex-shrink-0 pt-0.5 transition-colors"
                        aria-label="Fechar">
                    <i data-lucide="x" class="w-3.5 h-3.5"></i>
                </button>
            </div>
        </template>
    </div>
</template>
