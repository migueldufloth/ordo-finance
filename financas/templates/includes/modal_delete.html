<template x-teleport="body">
    <div x-show="show"
         @keydown.escape.window="show = false"
         class="fixed inset-0 z-[99] flex items-center justify-center"
         x-cloak>

        <!-- Backdrop -->
        <div x-show="show"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             @click="show = false"
             class="absolute inset-0 bg-black/40">
        </div>

        <!-- Painel -->
        <div x-show="show"
             x-trap.inert.noscroll="show"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             class="relative bg-white rounded-2xl shadow-xl p-6 max-w-sm w-full mx-4 border border-gray-100">

            <div class="flex items-center space-x-3 mb-4">
                <div class="w-10 h-10 bg-red-100 rounded-xl flex items-center justify-center flex-shrink-0">
                    <i data-lucide="trash-2" class="w-5 h-5 text-red-600"></i>
                </div>
                <div>
                    <h3 class="font-bold text-dark-800">Confirmar exclusão</h3>
                    <p class="text-dark-500 text-sm">Esta ação não pode ser desfeita.</p>
                </div>
            </div>

            <p class="text-sm text-dark-700 font-medium mb-5 bg-gray-50 rounded-lg p-3" x-text="name"></p>

            <div class="flex items-center justify-end space-x-2">
                <button @click="show = false"
                    class="px-4 py-2 text-sm font-medium text-dark-600 hover:text-dark-800 hover:bg-gray-100 rounded-lg transition-colors">
                    Cancelar
                </button>
                <form :action="url" method="post">
                    {% csrf_token %}
                    <button type="submit"
                        class="flex items-center space-x-1.5 px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-semibold rounded-lg transition-colors">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                        <span>Excluir</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</template>
