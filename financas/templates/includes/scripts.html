<script>
    function setTheme(theme) {
        localStorage.setItem('theme', theme);
        applyTheme(theme);
    }

    function applyTheme(theme) {
        const html = document.documentElement;
        const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);

        if (isDark) {
            html.classList.add('dark');
        } else {
            html.classList.remove('dark');
        }

        // Ícone reflete a preferência escolhida, não o resultado
        const iconName = theme === 'system' ? 'monitor' : theme === 'dark' ? 'moon' : 'sun';
        ['theme-icon', 'mobile-theme-icon'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.setAttribute('data-lucide', iconName);
        });

        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function showNotification(message) {
        const notification = document.createElement('div');
        notification.className = 'fixed top-4 right-4 bg-primary-500 text-white px-4 py-2 rounded-lg shadow-lg z-50 animate-fade-in';
        notification.textContent = message;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }

    document.addEventListener('DOMContentLoaded', function () {
        lucide.createIcons();

        const savedTheme = localStorage.getItem('theme') || 'system';
        applyTheme(savedTheme);

        // Atualiza automaticamente quando o SO muda a preferência
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if ((localStorage.getItem('theme') || 'system') === 'system') {
                applyTheme('system');
            }
        });
    });
</script>
