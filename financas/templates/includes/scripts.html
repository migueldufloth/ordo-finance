<script>
    // ── Tema ──────────────────────────────────────────────────────────────────

    function setTheme(theme) {
        localStorage.setItem('theme', theme);
        applyTheme(theme);
    }

    function applyTheme(theme) {
        const html = document.documentElement;
        const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        html.classList.toggle('dark', isDark);

        const iconName = theme === 'system' ? 'monitor' : theme === 'dark' ? 'moon' : 'sun';
        ['theme-icon', 'mobile-theme-icon'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.setAttribute('data-lucide', iconName);
        });

        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    // ── Toast (Pines event-driven) ────────────────────────────────────────────

    function toast(message, options) {
        window.dispatchEvent(new CustomEvent('toast-show', {
            detail: { message, type: (options && options.type) || 'default', duration: options && options.duration }
        }));
    }

    // ── Select customizado (Pines) ────────────────────────────────────────────

    function alpineSelect(fieldId, placeholder) {
        return {
            open: false,
            selected: '',
            selectedLabel: placeholder || 'Selecione...',
            options: [],
            _placeholder: placeholder || 'Selecione...',
            init() {
                const sel = document.getElementById(fieldId);
                if (!sel) return;
                this.options = Array.from(sel.options)
                    .filter(o => o.value !== '')
                    .map(o => ({ value: o.value, label: o.text.trim() }));
                if (sel.value) {
                    this.selected = sel.value;
                    this.selectedLabel = sel.options[sel.selectedIndex].text.trim();
                }
            },
            pick(opt) {
                this.selected = opt.value;
                this.selectedLabel = opt.label;
                const sel = document.getElementById(fieldId);
                if (sel) sel.value = opt.value;
                this.open = false;
                setTimeout(() => lucide.createIcons(), 0);
            },
            clear() {
                this.selected = '';
                this.selectedLabel = this._placeholder;
                const sel = document.getElementById(fieldId);
                if (sel) sel.value = '';
                this.open = false;
            }
        };
    }

    // ── Toggle de senha (login) ───────────────────────────────────────────────

    function togglePassword() {
        const field = document.getElementById('id_password');
        const icon  = document.getElementById('eye-icon');
        field.type = field.type === 'password' ? 'text' : 'password';
        icon.setAttribute('data-lucide', field.type === 'password' ? 'eye' : 'eye-off');
        lucide.createIcons();
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', function () {
        lucide.createIcons();

        const savedTheme = localStorage.getItem('theme') || 'system';
        applyTheme(savedTheme);

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if ((localStorage.getItem('theme') || 'system') === 'system') applyTheme('system');
        });

        // Formata inputs de moeda (valor / limite) em qualquer página
        document.querySelectorAll('input[name="valor"], input[name="limite"]').forEach(function (input) {
            input.addEventListener('input', function (e) {
                let value = e.target.value.replace(/\D/g, '');
                value = (value / 100).toFixed(2);
                e.target.value = value;
            });
        });

        // Renderiza mensagens Django como toasts
        const msgContainer = document.getElementById('django-messages');
        if (msgContainer) {
            msgContainer.querySelectorAll('span[data-level]').forEach(el => {
                toast(el.dataset.text, { type: el.dataset.level });
            });
        }
    });
</script>
