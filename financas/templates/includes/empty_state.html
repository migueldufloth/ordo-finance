<div class="text-center py-14">
    <div class="w-14 h-14 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i data-lucide="{{ icon }}" class="w-7 h-7 text-gray-400"></i>
    </div>
    <h3 class="font-bold text-dark-700 mb-2">{{ title }}</h3>
    <p class="text-dark-500 text-sm mb-6">{{ subtitle }}</p>
    <a href="{{ btn_url }}"
        class="inline-flex items-center space-x-2 bg-primary-500 hover:bg-primary-600 text-white font-semibold px-5 py-2.5 rounded-xl transition-colors shadow-md text-sm">
        <i data-lucide="plus" class="w-4 h-4"></i>
        <span>{{ btn_text }}</span>
    </a>
</div>
