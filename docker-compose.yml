version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=ordo
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/ordo
      - DEBUG=True

  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./api:/app
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/ordo

volumes:
  postgres_data:
