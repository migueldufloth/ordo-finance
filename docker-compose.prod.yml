version: '3.8'

services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    image: ordo-finance-web:latest
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    image: ordo-finance-api:latest
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
