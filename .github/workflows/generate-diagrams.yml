name: Generate Diagrams

on:
  push:
    paths:
      - 'docs/diagramas/**.puml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Gerar PNGs dos diagramas PlantUML
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Baixar plantuml.jar (release mais recente)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PLANTUML_URL=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/plantuml/plantuml/releases/latest \
            | python3 -c "import sys,json;d=json.load(sys.stdin);skip=['lgpl','asl','mit','bsd','pdf'];print(next(a['browser_download_url'] for a in d['assets'] if a['name'].endswith('.jar') and not any(s in a['name'] for s in skip)))")
          echo "URL: $PLANTUML_URL"
          curl -L -o plantuml.jar "$PLANTUML_URL"
          java -jar plantuml.jar -version

      - name: Criar diretório de saída
        run: mkdir -p docs/diagramas/png

      - name: Gerar PNGs
        run: |
          find docs/diagramas/src -name "*.puml" | sort | while read puml; do
            echo "Processando: $puml"
            java -jar plantuml.jar -tpng -o "$(pwd)/docs/diagramas/png" "$puml"
          done

      - name: Commitar e pushar PNGs gerados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/diagramas/png/
          if ! git diff --cached --quiet; then
            git commit -m "chore(diagrams): regenerate PNGs [skip ci]"
            git push
          else
            echo "Nenhuma alteracao nos PNGs."
          fi
