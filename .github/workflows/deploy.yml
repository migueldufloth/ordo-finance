name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Verificar configuração do Django
        env:
          SECRET_KEY: "ci-secret-key-not-used-in-production"
          DEBUG: "True"
        run: python manage.py check

      - name: Rodar testes
        env:
          SECRET_KEY: "ci-secret-key-not-used-in-production"
          DEBUG: "True"
        run: python manage.py test financas --verbosity=2

  deploy:
    name: Deploy em Produção
    runs-on: self-hosted
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15

    steps:
      - name: Atualizar código e reconstruir containers
        working-directory: /home/ubuntu/ordo-finance
        run: |
          git fetch origin main
          BEFORE=$(git rev-parse HEAD)
          git pull origin main

          CHANGED=$(git diff $BEFORE HEAD --name-only)

          if echo "$CHANGED" | grep -q "^api/"; then
            docker compose -f docker-compose.prod.yml build api
          fi

          docker compose -f docker-compose.prod.yml build web
          docker compose -f docker-compose.prod.yml up -d
          docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput
